<svg width="1600" height="420" viewBox="0 0 1600 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Linky README Header Minimal</title>
  <desc id="desc">Ultra-minimal monochrome Linky header with a centered slash mark and bottom-right domain.</desc>

  <!-- Minimal composition: high contrast, lots of whitespace, strict geometry. -->
  <rect width="1600" height="420" fill="white" />
  <rect x="20" y="20" width="1560" height="380" stroke="black" stroke-width="2" fill="none" />

  <!-- Keep the slash centered so the mark owns the whole composition. -->
  <line x1="743" y1="270" x2="857" y2="94" stroke="black" stroke-width="62" stroke-linecap="square" />

  <!-- Anchor the domain to the bottom-right so it reads like a quiet signature. -->
  <text x="1510" y="375" text-anchor="end" fill="black" font-family="IBM Plex Mono, Menlo, Monaco, monospace" font-size="26" font-weight="500" letter-spacing="0.8">
    getalinky.com
  </text>
</svg>
